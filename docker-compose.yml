version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_dev
      POSTGRES_DB: hrms_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      LLM_PROVIDER: groq
      GROQ_API_KEY: ${GROQ_API_KEY}
      HRMS_BASE_URL: http://host.docker.internal:3001/api
      SSO_PUBLIC_KEY: ${SSO_PUBLIC_KEY}
      SECRET_KEY: dev_secret
      CHATBOT_DATABASE_URL: postgresql://chatbot:chatbot_dev@postgres:5432/hrms_chatbot
      REDIS_URL: redis://redis:6379
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
